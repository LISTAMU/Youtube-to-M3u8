name: YouTube Live M3U8 Generator
run-name: Generate playlist with WARP 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP with retry
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          
          # Install wireguard-tools
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          
          # Install wgcf
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          # Retry loop for WARP connection
          for i in {1..3}; do
            echo "🔄 Attempt $i to setup WARP..."
            
            # Register WARP account
            wgcf register --accept-tos
            wgcf generate
            
            # Fix WireGuard config for GitHub Actions
            sed -i 's/AllowedIPs = 0.0.0.0\/0,::\/0/AllowedIPs = 0.0.0.0\/0/' wgcf-profile.conf
            sed -i '/Address = fd/d' wgcf-profile.conf
            sed -i '/DNS = /d' wgcf-profile.conf
            
            # Setup WireGuard
            sudo mkdir -p /etc/wireguard
            sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
            
            # Start WireGuard
            sudo wg-quick up /etc/wireguard/wgcf.conf || {
              echo "⚠️ wg-quick failed, trying manual setup..."
              sudo ip link add dev wgcf type wireguard
              sudo ip address add dev wgcf $(grep 'Address = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ')
              sudo wg setconf wgcf /etc/wireguard/wgcf.conf
              sudo ip link set up dev wgcf
              
              # Add routing manually
              sudo ip route add default dev wgcf table 200 || true
              sudo ip rule add from $(grep 'Address = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ' | cut -d/ -f1) table 200 || true
            }
            
            # Wait for connection
            sleep 5
            
            # Verify WARP connection
            WARP_CHECK=$(curl -s https://cloudflare.com/cdn-cgi/trace)
            echo "🔍 WARP status:"
            echo "$WARP_CHECK" | grep -E "ip|warp"
            
            if echo "$WARP_CHECK" | grep -q "warp=on"; then
              echo "✅ WARP connected successfully on attempt $i"
              
              # Show current IP and ASN
              echo "🌐 Current IP: $(curl -s https://ipinfo.io/ip)"
              echo "🌐 Current ASN: $(curl -s https://ipinfo.io/org)"
              
              # Test routing to YouTube
              echo "🧪 Testing routing to YouTube..."
              YT_IP=$(curl -s --connect-timeout 10 https://www.youtube.com/robots.txt | head -1)
              if [ -n "$YT_IP" ]; then
                echo "✅ YouTube is reachable via WARP"
              else
                echo "⚠️ YouTube might be blocked, but continuing..."
              fi
              
              break
            fi
            
            if [ $i -eq 3 ]; then
              echo "⚠️ WARP failed after 3 attempts, continuing without it"
            else
              echo "⏱️ Waiting 30s before retry..."
              sleep 30
              # Cleanup failed attempt
              sudo wg-quick down /etc/wireguard/wgcf.conf 2>/dev/null || true
              sudo ip link del dev wgcf 2>/dev/null || true
              rm -f wgcf-account.toml wgcf-profile.conf
            fi
          done

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          # Verify cookies format
          head -3 cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist with enhanced Python script
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import subprocess
          from datetime import datetime, timezone

          def get_stream_url(url, cookies_file):
              """Enhanced function with better format selection"""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'extract_flat': False,
                  'source_address': '0.0.0.0',
                  # Disable problematic extractors
                  'extractor_args': {
                      'youtube': {
                          'player_skip': ['webpage', 'config', 'js'],
                          'player_client': ['android', 'web'],
                      }
                  },
              }
              
              for attempt in range(5):
                  # Exponential backoff with jitter
                  delay = min(20 * (2 ** attempt) + random.randint(0, 10), 300)
                  print(f"  ⏱️ Attempt {attempt + 1}/5 - waiting {delay}s...")
                  time.sleep(delay)
                  
                  try:
                      # Get video info and check live status
                      with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                          info = ydl.extract_info(url, download=False)
                          
                          if not info:
                              print(f"  ⚠️ No info returned")
                              continue
                          
                          # Check if live (handle multiple status formats)
                          is_live = info.get('is_live', False)
                          live_status = info.get('live_status', '')
                          
                          if not (is_live or live_status == 'is_live' or live_status == 'is_upcoming'):
                              print(f"  ⚠️ Not currently live (status: {live_status})")
                              return None, info.get('title', 'Unknown')
                          
                          video_id = info.get('id')
                          if not video_id:
                              print(f"  ⚠️ No video ID found")
                              continue
                          
                          print(f"  ✅ Got video ID: {video_id}")
                          
                          # Small delay before format request
                          time.sleep(5)
                          
                          # Get all formats
                          formats = info.get('formats', [])
                          stream_urls = []
                          
                          # Priority 1: m3u8 formats (best for live)
                          for fmt in formats:
                              protocol = fmt.get('protocol', '')
                              if protocol in ['m3u8', 'm3u8_native'] and fmt.get('url'):
                                  stream_urls.append({
                                      'url': fmt['url'],
                                      'quality': fmt.get('format_note', 'unknown'),
                                      'protocol': protocol
                                  })
                          
                          # Priority 2: direct HTTP streams
                          for fmt in formats:
                              if fmt.get('url') and fmt.get('protocol') in ['http', 'https']:
                                  stream_urls.append({
                                      'url': fmt['url'],
                                      'quality': fmt.get('format_note', 'unknown'),
                                      'protocol': fmt.get('protocol')
                                  })
                          
                          if stream_urls:
                              # Log all found streams
                              for i, s in enumerate(stream_urls[:3]):  # Show first 3
                                  print(f"    📊 Found: {s['quality']} ({s['protocol']})")
                              
                              # Return the best one (first in list)
                              return stream_urls[0]['url'], info.get('title', 'Unknown')
                          
                          # Fallback: try specific format IDs
                          for fmt_id in ['301', '300', '94', '93', 'best']:
                              try:
                                  with yt_dlp.YoutubeDL({**ydl_opts, 'format': fmt_id}) as ydl2:
                                      info2 = ydl2.extract_info(f"https://youtube.com/watch?v={video_id}", download=False)
                                      if info2 and info2.get('url'):
                                          print(f"    ✅ Got format {fmt_id}")
                                          return info2['url'], info.get('title', 'Unknown')
                              except:
                                  continue
                  
                  except Exception as e:
                      error_str = str(e)
                      print(f"  ❌ Attempt {attempt + 1} failed: {error_str[:150]}")
                      
                      if 'rate' in error_str.lower() or '429' in error_str:
                          print("  ⚠️ Rate limited - increasing delay")
                      elif 'bot' in error_str.lower() or 'sign in' in error_str.lower():
                          print("  ⚠️ Bot detection triggered!")
                          # Check current IP
                          try:
                              result = subprocess.run(['curl', '-s', 'https://cloudflare.com/cdn-cgi/trace'], 
                                                    capture_output=True, text=True, timeout=10)
                              print(f"  🔍 IP Info: {result.stdout.strip()}")
                          except:
                              pass
              
              return None, None

          # Main execution
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              exit(1)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found in streams.txt")
              exit(0)

          m3u8 = [
              "#EXTM3U",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              ""
          ]

          total = active = 0

          for line in lines:
              url_match = re.search(r'https?://\S+', line)
              if not url_match:
                  continue
              
              url = url_match.group()
              total += 1
              
              # Extract name from @handle or URL
              name_match = re.search(r'@([^/]+)', url)
              name = name_match.group(1) if name_match else f"Channel {total}"
              
              print(f"\n📺 [{total}/{len(lines)}] Processing: {name}")
              print(f"    URL: {url[:80]}...")
              
              stream_url, title = get_stream_url(url, 'cookies.txt')
              
              if stream_url:
                  active += 1
                  print(f"  ✅ SUCCESS: Direct stream acquired")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\" tvg-logo=\"\",{name} (Live)",
                      stream_url,
                      ""
                  ])
              else:
                  print(f"  ⚠️ FAILED: Using fallback URL")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\" tvg-logo=\"\",{name} (Offline/YouTube)",
                      url,
                      ""
                  ])
              
              # Cooldown between channels (skip last)
              if total < len(lines):
                  cooldown = random.randint(180, 300)
                  print(f"  ⏱️ Cooldown: {cooldown}s before next channel...")
                  time.sleep(cooldown)

          m3u8.extend([
              f"",
              f"# Summary: {active}/{total} direct streams active",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n{'='*50}")
          print(f"📊 FINAL SUMMARY: {active}/{total} streams with direct URLs")
          print(f"{'='*50}")

          PYTHON_EOF

          python generate.py

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -30 streams.m3u8
          echo "..."
          echo "=========================="
          wc -l streams.m3u8

      - name: Cleanup & Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cleanup sensitive files
          rm -f cookies.txt generate.py wgcf-profile.conf wgcf-account.toml
          
          # Stop WireGuard
          sudo wg-quick down /etc/wireguard/wgcf.conf 2>/dev/null || true
          sudo ip link del dev wgcf 2>/dev/null || true
          
          # Git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          ACTIVE_COUNT=$(grep -c '^http' streams.m3u8 || echo "0")
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)] - ${ACTIVE_COUNT} active streams"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Playlist updated and pushed"
