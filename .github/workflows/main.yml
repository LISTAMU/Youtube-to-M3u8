name: YouTube Live M3U8 Generator
run-name: Generate playlist with cookies 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'  # Run every 3 hours (even less frequent)
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yt-dlp and Deno
        run: |
          # Update pip and install yt-dlp
          pip install --upgrade pip
          pip install --upgrade yt-dlp
          
          # Install Deno properly
          echo "📦 Installing Deno..."
          curl -fsSL https://deno.land/install.sh | sh
          
          # Add Deno to PATH
          DENO_PATH="/home/runner/.deno/bin"
          echo "$DENO_PATH" >> $GITHUB_PATH
          export PATH="$DENO_PATH:$PATH"
          
          # Verify installations
          echo ""
          echo "✅ yt-dlp version: $(yt-dlp --version)"
          echo "✅ Deno version: $(deno --version | head -1)"
          echo "✅ Deno location: $(which deno)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies file created ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ No cookies secret found"
            exit 1
          fi

      - name: Generate playlist with exponential backoff
        run: |
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "# Using exponential backoff for rate limit avoidance" >> streams.m3u8
          echo "" >> streams.m3u8

          TOTAL=0
          ACTIVE=0

          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue

            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue

            TOTAL=$((TOTAL + 1))
            echo ""
            echo "📺 [$TOTAL] Processing: $URL"

            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel $TOTAL")

            STREAM_URL=""
            RETRY_COUNT=0
            MAX_RETRIES=5
            BASE_DELAY=20  # Start with 20 seconds

            if [ -f "cookies.txt" ]; then
              echo "  🔑 Using cookies..."
              
              while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ -z "$STREAM_URL" ]; do
                RETRY_COUNT=$((RETRY_COUNT + 1))
                
                # Calculate delay with exponential backoff and jitter
                DELAY=$((BASE_DELAY * (2 ** (RETRY_COUNT - 1)) + RANDOM % 10))
                echo "  ⏱️ Attempt $RETRY_COUNT/$MAX_RETRIES - Waiting ${DELAY}s before request..."
                sleep $DELAY
                
                echo "  🔍 Fetching video ID (attempt $RETRY_COUNT)..."
                
                # Capture both stdout and stderr
                VIDEO_ID_OUTPUT=$(yt-dlp --cookies cookies.txt --socket-timeout 30 --get-id "$URL" 2>&1)
                EXIT_CODE=$?
                
                if [ $EXIT_CODE -eq 0 ] && [ -n "$VIDEO_ID_OUTPUT" ]; then
                  VIDEO_ID="$VIDEO_ID_OUTPUT"
                  echo "  ✅ Got video ID: $VIDEO_ID"
                  
                  # Small delay before format requests
                  sleep 5
                  
                  # Try formats in order of quality
                  for fmt in 301 300 best; do
                    echo "    Trying format $fmt..."
                    STREAM_URL=$(yt-dlp --cookies cookies.txt --socket-timeout 30 -f $fmt -g "https://youtube.com/watch?v=$VIDEO_ID" 2>/dev/null | head -1)
                    if [ -n "$STREAM_URL" ]; then
                      echo "    ✅ Got format $fmt"
                      break
                    fi
                    sleep 3
                  done
                else
                  echo "  ❌ Attempt $RETRY_COUNT failed"
                  echo "  Error: $(echo "$VIDEO_ID_OUTPUT" | head -1)"
                  
                  # Check if it's a rate limit error
                  if [[ "$VIDEO_ID_OUTPUT" == *"rate-limited"* ]] || [[ "$VIDEO_ID_OUTPUT" == *"429"* ]]; then
                    echo "  ⚠️ Rate limit detected - will wait longer"
                    # Increase base delay for next attempt
                    BASE_DELAY=$((BASE_DELAY + 30))
                  fi
                fi
              done
            fi

            if [ -n "$STREAM_URL" ]; then
              echo "  ✅ Got direct stream URL after $RETRY_COUNT attempts!"
              ACTIVE=$((ACTIVE + 1))
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (Live)" >> streams.m3u8
              echo "$STREAM_URL" >> streams.m3u8
            else
              echo "  ⚠️ All $MAX_RETRIES attempts failed - using channel URL as fallback"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (via YouTube)" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            fi

            # Long cool-down between channels (3 minutes)
            if [ $TOTAL -lt 3 ]; then
              COOLDOWN=$((180 + RANDOM % 60))  # 180-240 seconds
              echo "  ⏱️ Channel cooldown: Waiting ${COOLDOWN}s before next channel..."
              sleep $COOLDOWN
            fi

          done < streams.txt

          echo "" >> streams.m3u8
          echo "# Summary: $ACTIVE/$TOTAL direct streams" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8
          
          # Clean up
          rm -f cookies.txt
          
          echo ""
          echo "📊 FINAL SUMMARY: $ACTIVE/$TOTAL streams have direct URLs"

      - name: Show playlist
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          cat streams.m3u8

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)]"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Playlist updated and pushed"
