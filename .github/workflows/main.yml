name: YouTube Live M3U8 Generator
run-name: Generating live M3U8 playlist 🎬

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ffmpeg
          pip install --upgrade yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Check streams.txt
        run: |
          if [ ! -f "streams.txt" ]; then
            echo "Creating default streams.txt"
            echo "# YouTube Live Streams" > streams.txt
            echo "https://www.youtube.com/@AriseNewsChannel" >> streams.txt
            echo "https://www.youtube.com/@channelstv" >> streams.txt
            echo "https://www.youtube.com/@NewsCentralTV" >> streams.txt
          fi
          cat streams.txt

      - name: Generate M3U8
        id: generate
        run: |
          echo "Generating playlist..."
          
          # Create header
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "" >> streams.m3u8
          
          # Try to get live streams, but always add URLs even if check fails
          while read line; do
            # Skip comments
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "$line" ]] && continue
            
            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue
            
            echo ""
            echo "Processing: $URL"
            
            # Extract channel name for fallback
            CHANNEL=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel")
            
            # Try quick check with timeout
            TITLE=""
            if command -v timeout &> /dev/null; then
              TITLE=$(timeout 10 yt-dlp --socket-timeout 5 --get-title "$URL" 2>/dev/null || echo "")
            fi
            
            if [ -n "$TITLE" ]; then
              echo "  ✅ Live: $TITLE"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$TITLE" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            else
              echo "  ⚠️ Adding as offline (timeout/error)"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$CHANNEL (Status Unknown)" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            fi
            
            # Small delay
            sleep 1
            
          done < streams.txt
          
          echo "" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8
          
          echo "✅ Playlist generated"

      - name: Show playlist
        run: |
          echo ""
          echo "Generated playlist:"
          echo "=================="
          cat streams.m3u8

      - name: Pull latest changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No changes to pull"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add streams.m3u8
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update M3U8 playlist"
          git push origin main
          echo "✅ Pushed updates"
