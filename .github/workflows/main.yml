name: YouTube Live M3U8 Generator
run-name: Generate playlist with cookies 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yt-dlp and Deno
        run: |
          # Update pip and install yt-dlp
          pip install --upgrade pip
          pip install --upgrade yt-dlp
          
          # Install Deno properly
          echo "📦 Installing Deno..."
          curl -fsSL https://deno.land/install.sh | sh
          
          # Add Deno to PATH
          DENO_PATH="/home/runner/.deno/bin"
          echo "$DENO_PATH" >> $GITHUB_PATH
          export PATH="$DENO_PATH:$PATH"
          
          # Verify installations
          echo ""
          echo "✅ yt-dlp version: $(yt-dlp --version)"
          echo "✅ Deno version: $(deno --version | head -1)"
          echo "✅ Deno location: $(which deno)"

      - name: Diagnose secret before creating file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          echo "🔍 SECRET DIAGNOSTIC"
          echo "===================="
          
          # Check if secret exists
          if [ -n "$COOKIES" ]; then
            echo "✅ Secret exists"
            echo "📏 Secret length: ${#COOKIES} characters"
            echo "📝 First 10 characters: ${COOKIES:0:10}"
            echo "📝 Last 10 characters: ${COOKIES: -10}"
            
            # Check if it looks like a cookies file
            if [[ "$COOKIES" == *".youtube.com"* ]]; then
              echo "✅ Contains '.youtube.com' - looks like valid cookie format"
            else
              echo "⚠️ Does NOT contain '.youtube.com' - may be invalid format"
            fi
            
            # Count lines (approximate)
            LINE_COUNT=$(echo "$COOKIES" | wc -l)
            echo "📊 Approximate lines: $LINE_COUNT"
          else
            echo "❌ Secret is empty or doesn't exist!"
            exit 1
          fi

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          echo "$COOKIES" > cookies.txt
          echo "✅ cookies.txt created"
          echo "File size: $(wc -l < cookies.txt) lines"
          echo "First line: $(head -1 cookies.txt)"
          echo "Last line: $(tail -1 cookies.txt)"

      - name: Diagnose environment
        run: |
          echo "🔍 ENVIRONMENT DIAGNOSTIC"
          echo "========================="
          
          echo "1. Checking Deno:"
          which deno || echo "❌ Deno not found"
          deno --version || echo "❌ Deno version failed"
          
          echo ""
          echo "2. Checking cookies file:"
          ls -la cookies.txt
          echo "First 2 lines:"
          head -2 cookies.txt
          echo "Last 2 lines:"
          tail -2 cookies.txt
          
          echo ""
          echo "3. Testing yt-dlp with cookies:"
          yt-dlp --cookies cookies.txt --dump-json --simulate "https://www.youtube.com/@AriseNewsChannel/live" 2>&1 || echo "❌ yt-dlp test failed"
          
          echo ""
          echo "4. Checking PATH:"
          echo $PATH

      - name: Generate playlist
        run: |
          echo "#EXTM3U" > streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "" >> streams.m3u8

          TOTAL=0
          ACTIVE=0

          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue

            URL=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            [ -z "$URL" ] && continue

            TOTAL=$((TOTAL + 1))
            echo ""
            echo "📺 [$TOTAL] Processing: $URL"

            NAME=$(echo "$URL" | grep -o '@[^/]*' | tr -d '@' || echo "Channel $TOTAL")

            STREAM_URL=""

            if [ -f "cookies.txt" ]; then
              echo "  🔑 Using cookies..."
              
              # Get video ID with timeout
              VIDEO_ID=$(yt-dlp --cookies cookies.txt --socket-timeout 15 --get-id "$URL" 2>/dev/null)
              
              if [ -n "$VIDEO_ID" ]; then
                echo "  ✅ Got video ID: $VIDEO_ID"
                
                # Try formats in order of quality
                for fmt in 301 300 best; do
                  STREAM_URL=$(yt-dlp --cookies cookies.txt --socket-timeout 15 -f $fmt -g "https://youtube.com/watch?v=$VIDEO_ID" 2>/dev/null | head -1)
                  if [ -n "$STREAM_URL" ]; then
                    echo "    ✅ Got format $fmt"
                    break
                  fi
                done
              else
                echo "  ❌ Could not get video ID"
              fi
            fi

            if [ -n "$STREAM_URL" ]; then
              echo "  ✅ Got direct stream URL!"
              ACTIVE=$((ACTIVE + 1))
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (Live)" >> streams.m3u8
              echo "$STREAM_URL" >> streams.m3u8
            else
              echo "  ⚠️ Using channel URL as fallback"
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$NAME (via YouTube)" >> streams.m3u8
              echo "$URL" >> streams.m3u8
            fi

            sleep 1

          done < streams.txt

          echo "" >> streams.m3u8
          echo "# Summary: $ACTIVE/$TOTAL direct streams" >> streams.m3u8
          echo "# Updated: $(date -u)" >> streams.m3u8
          
          # Clean up
          rm -f cookies.txt
          
          echo ""
          echo "📊 Summary: $ACTIVE/$TOTAL streams have direct URLs"

      - name: Show playlist
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          cat streams.m3u8

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)]"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Playlist updated and pushed"
