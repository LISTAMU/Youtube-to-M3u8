name: YouTube Live M3U8 Generator - DIAGNOSTIC
run-name: Running diagnostics 🩺

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
            echo "✅ Cookies file created ($(wc -l < cookies.txt) lines)"
          else
            echo "❌ No cookies secret found"
            exit 1
          fi

      - name: Diagnose
        run: |
          set -x  # Print each command
          echo "🔍 Starting diagnostics..."
          
          echo "Test 1: Network connectivity"
          curl -I https://www.youtube.com -L --max-time 10
          
          echo ""
          echo "Test 2: yt-dlp version"
          yt-dlp --version
          
          echo ""
          echo "Test 3: yt-dlp with cookies (verbose)"
          yt-dlp --cookies cookies.txt --verbose --dump-json "https://www.youtube.com/@AriseNewsChannel/live" 2>&1
          
          echo ""
          echo "Test 4: First 5 lines of cookies.txt"
          head -5 cookies.txt
