name: YouTube Live M3U8 Generator
run-name: Generate playlist with WARP 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP (Manual)
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          
          # Install wgcf
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          # Register and generate
          wgcf register --accept-tos
          wgcf generate
          
          # Parse config values
          PRIVATE_KEY=$(grep 'PrivateKey = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ')
          ADDRESS=$(grep 'Address = ' wgcf-profile.conf | grep -oE '172\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+')
          PUBLIC_KEY=$(grep 'PublicKey = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ')
          ENDPOINT=$(grep 'Endpoint = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ')
          
          echo "🔧 Config: $ADDRESS -> $ENDPOINT"
          
          # Setup WireGuard manually (avoiding wg-quick nftables issues)
          sudo ip link add dev wgcf type wireguard
          sudo ip address add dev wgcf $ADDRESS
          sudo wg set wgcf private-key <(echo "$PRIVATE_KEY") peer "$PUBLIC_KEY" endpoint "$ENDPOINT" allowed-ips 0.0.0.0/0
          sudo ip link set up dev wgcf
          
          # Setup routing
          sudo ip route add default dev wgcf table 200
          sudo ip rule add from $(echo $ADDRESS | cut -d/ -f1) table 200
          
          # Verify
          sleep 2
          echo "🔍 Interface status:"
          sudo wg show wgcf | head -5
          
          echo "🌐 IP Check:"
          curl -s --max-time 8 https://cloudflare.com/cdn-cgi/trace | grep -E "ip|warp" || echo "Check failed"
          
          echo "🌐 Public IP: $(curl -s --max-time 8 https://ipinfo.io/ip)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist
        timeout-minutes: 20
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import subprocess
          import sys
          from datetime import datetime, timezone

          def get_stream_url(url, cookies_file):
              """Extract stream URL with timeout protection"""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 15,
                  'extract_flat': False,
                  'source_address': '0.0.0.0',
                  'extractor_args': {
                      'youtube': {
                          'player_skip': ['webpage', 'config', 'js'],
                          'player_client': ['android'],
                      }
                  },
              }
              
              for attempt in range(3):
                  delay = min(10 * (2 ** attempt), 45)
                  print(f"  ⏱️ Attempt {attempt + 1}/3 - wait {delay}s...")
                  time.sleep(delay)
                  
                  try:
                      with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                          info = ydl.extract_info(url, download=False)
                          
                          if not info:
                              continue
                          
                          # Handle playlists (channel live tabs)
                          if 'entries' in info:
                              entries = [e for e in info['entries'] if e and e.get('is_live')]
                              if not entries:
                                  print("  ⚠️ No live streams in channel")
                                  return None, info.get('title')
                              info = entries[0]
                          
                          if not info.get('is_live'):
                              print(f"  ⚠️ Not live (status: {info.get('live_status')})")
                              return None, info.get('title')
                          
                          video_id = info.get('id')
                          if not video_id:
                              continue
                          
                          print(f"  ✅ Video ID: {video_id}")
                          
                          # Get m3u8 url
                          for fmt in info.get('formats', []):
                              if fmt.get('protocol') in ['m3u8', 'm3u8_native'] and fmt.get('url'):
                                  return fmt['url'], info.get('title')
                          
                          # Fallback
                          if info.get('url'):
                              return info['url'], info.get('title')
                              
                  except yt_dlp.utils.DownloadError as e:
                      err = str(e)
                      print(f"  ❌ {err[:80]}")
                      if '404' in err or 'not found' in err.lower():
                          break  # Don't retry 404s
                      if 'bot' in err.lower() or 'sign in' in err.lower():
                          print("  ⚠️ Bot check!")
                          break
                  except Exception as e:
                      print(f"  ❌ {str(e)[:80]}")
              
              return None, None

          # Main
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(1)

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          m3u8 = ["#EXTM3U", f"# Generated: {datetime.now(timezone.utc).isoformat()}", ""]

          total = active = 0

          for line in lines:
              # Parse URL
              url_match = re.search(r'(https?://[^\s]+)', line)
              if not url_match:
                  # Construct from handle
                  m = re.search(r'@([^\s]+)', line)
                  url = f"https://youtube.com/@{m.group(1)}/live" if m else None
              else:
                  url = url_match.group(1)
              
              if not url:
                  continue
              
              total += 1
              name = re.search(r'@([^/]+)', url).group(1) if '@' in url else f"Ch{total}"
              
              print(f"\n📺 [{total}/{len(lines)}] {name}")
              
              stream_url, title = get_stream_url(url, 'cookies.txt')
              
              if stream_url:
                  active += 1
                  print(f"  ✅ Live")
                  m3u8.extend([f"#EXTINF:-1 group-title=\"YouTube Live\",{name} (Live)", stream_url, ""])
              else:
                  print(f"  ⚠️ Offline")
                  m3u8.extend([f"#EXTINF:-1 group-title=\"YouTube Live\",{name} (Offline)", url, ""])
              
              if total < len(lines):
                  time.sleep(random.randint(30, 90))

          m3u8.extend(["", f"# Summary: {active}/{total}", f"# Updated: {datetime.now(timezone.utc).isoformat()}"])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n📊 Result: {active}/{total} active")

          PYTHON_EOF

          python generate.py

      - name: Show results
        run: |
          echo "📄 Playlist preview:"
          head -15 streams.m3u8
          echo "..."
          tail -5 streams.m3u8

      - name: Cleanup & Commit
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f cookies.txt generate.py wgcf-profile.conf wgcf-account.toml
          sudo ip rule del from $(sudo wg show wgcf | grep 'allowed ips' | head -1 | grep -oE '172\.[0-9]+\.[0-9]+\.[0-9]+') table 200 2>/dev/null || true
          sudo ip route del default dev wgcf table 200 2>/dev/null || true
          sudo ip link del dev wgcf 2>/dev/null || true
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          git commit -m "🔄 Update [$(date -u +%H:%M)] - $(grep -c '^http' streams.m3u8) streams"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Done"
