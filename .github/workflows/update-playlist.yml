      - name: Generate M3U8 playlist
        id: generate
        run: |
          echo "🎬 Generating YouTube Live M3U8 Playlist..."
          
          # Check if streams.txt exists
          if [ ! -f "streams.txt" ]; then
            echo "❌ streams.txt not found!"
            exit 1
          fi
          
          # Create playlist file
          echo "#EXTM3U" > streams.m3u8
          echo "#EXT-X-VERSION:3" >> streams.m3u8
          echo "# Auto-generated YouTube Live M3U8 Playlist" >> streams.m3u8
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          echo "" >> streams.m3u8
          
          ACTIVE_STREAMS=0
          TOTAL_STREAMS=0
          
          # Read streams.txt
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue
            
            # Extract URL
            url=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            
            if [ -n "$url" ]; then
              TOTAL_STREAMS=$((TOTAL_STREAMS + 1))
              echo ""
              echo "🔍 [$TOTAL_STREAMS] Checking: $url"
              
              # Create a temp file for errors
              ERROR_LOG=$(mktemp)
              
              # Try to get video info with a longer timeout and follow redirects
              if info=$(yt-dlp --socket-timeout 30 --geo-bypass -J "$url" 2>"$ERROR_LOG"); then
                echo "  ✅ Successfully fetched info."
                title=$(echo "$info" | jq -r '.title // "Unknown Stream"')
                channel=$(echo "$info" | jq -r '.channel // "YouTube"')
                is_live=$(echo "$info" | jq -r '.is_live // false')
                duration=$(echo "$info" | jq -r '.duration // 0')
                webpage_url=$(echo "$info" | jq -r '.webpage_url // ""')
                
                # Use the webpage URL for the stream if available (more reliable)
                stream_url="${webpage_url:-$url}"
                
                # Check if live (live flag OR duration 0 for 24/7 streams)
                if [ "$is_live" = "true" ] || [ "$duration" = "null" ] || [ "$duration" = "0" ]; then
                  echo "  ✅ Stream is LIVE!"
                  ACTIVE_STREAMS=$((ACTIVE_STREAMS + 1))
                  channel_id=$(echo "$channel" | tr -d ' ' | tr -cd '[:alnum:]')
                  
                  # Try to get the direct stream URL (optional, but better for playability)
                  direct_url=$(yt-dlp --socket-timeout 15 -g -f "best" "$stream_url" 2>/dev/null | head -1)
                  final_url="${direct_url:-$stream_url}"
                  
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_id}.yt\" group-title=\"News\",${title} (Live)" >> streams.m3u8
                  echo "$final_url" >> streams.m3u8
                  echo "  ✅ Added to playlist"
                else
                  echo "  ⚠️  Stream is not live"
                  channel_id=$(echo "$channel" | tr -d ' ' | tr -cd '[:alnum:]')
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_id}.yt\" group-title=\"News\",${title} (Offline)" >> streams.m3u8
                  echo "# Stream currently unavailable" >> streams.m3u8
                fi
              else
                echo "  ❌ yt-dlp failed to fetch info."
                echo "  🔍 Error details:"
                head -10 "$ERROR_LOG" | sed 's/^/    /'
                
                # Add a placeholder for the failed URL
                channel_name=$(echo "$url" | grep -o '@[^/]*' | tr -d '@' || echo "Unknown")
                echo "" >> streams.m3u8
                echo "#EXTINF:-1 tvg-id=\"${channel_name}.yt\" group-title=\"News\",${channel_name} (Error - check logs)" >> streams.m3u8
                echo "# Failed to fetch info for: $url" >> streams.m3u8
              fi
              
              rm -f "$ERROR_LOG"
            fi
          done < streams.txt
          
          # Add summary
          echo "" >> streams.m3u8
          echo "# ================================" >> streams.m3u8
          echo "# SUMMARY" >> streams.m3u8
          echo "# ================================" >> streams.m3u8
          echo "# Total streams configured: $TOTAL_STREAMS" >> streams.m3u8
          echo "# Active live streams: $ACTIVE_STREAMS" >> streams.m3u8
          echo "# Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          
          echo "active=$ACTIVE_STREAMS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_STREAMS" >> $GITHUB_OUTPUT
            git push
          else
            echo "No changes to commit"
          fi
