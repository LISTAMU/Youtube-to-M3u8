<!DOCTYPE html>
<html>
<head>
    <title>Live News Streams</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #333; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; margin: 10px 0; border-radius: 5px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Live News Streams</h1>
        <p>Playlist URL (for VLC/Streamlink):</p>
        <pre>https://uticap.github.io/Youtube-to-M3u8/streams.m3u8</pre>
        <a href="streams.m3u8" class="btn">▶️ Download Playlist</a>
        <h3>How to use:</h3>
        <pre>streamlink --player=vlc https://uticap.github.io/Youtube-to-M3u8/streams.m3u8 best</pre>
        <p>Or open the playlist directly in VLC (File → Open Network Stream)</p>
    </div>
</body>
</html>
